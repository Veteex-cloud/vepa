<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>VEPA Test Login</title>
<style>
body{font-family:Arial;max-width:400px;margin:100px auto;padding:20px;}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;}
button{width:100%;padding:12px;background:#0f2340;color:#fff;border:none;border-radius:4px;font-size:16px;cursor:pointer;}
#msg{margin-top:12px;padding:10px;border-radius:4px;font-size:14px;}
</style>
</head>
<body>
<h2>VEPA — Test Login</h2>
<input type="email" id="email" value="gianni.crabuzza@gmail.com">
<input type="password" id="pw" placeholder="Password">
<button onclick="test()">Accedi</button>
<div id="msg"></div>

<script>
const URL = 'https://fycbvtrxbldcxvrzfupz.supabase.co';
const KEY = 'sb_publishable_Dziiq6UP2MXxphLaCyX-oA_WwH3orWj';

async function test(){
  const email = document.getElementById('email').value;
  const pw    = document.getElementById('pw').value;
  const msg   = document.getElementById('msg');
  
  msg.style.background='#eee'; msg.textContent='Connessione in corso...';
  
  try {
    const r = await fetch(URL+'/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: {'Content-Type':'application/json','apikey':KEY},
      body: JSON.stringify({email, password:pw})
    });
    const d = await r.json();
    console.log('Risposta:', d);
    
    if(r.ok && d.access_token){
      msg.style.background='#e6f4ec'; msg.style.color='#1a5c35';
      msg.textContent='✓ Login OK! Utente: '+d.user.email;
    } else {
      msg.style.background='#fcecea'; msg.style.color='#8b1a1a';
      msg.textContent='✗ Errore: '+(d.error_description||d.msg||d.message||JSON.stringify(d));
    }
  } catch(e) {
    msg.style.background='#fcecea'; msg.style.color='#8b1a1a';
    msg.textContent='✗ Errore rete: '+e.message;
  }
}
</script>
</body>
</html>
